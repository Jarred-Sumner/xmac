name: release

# Every push to main rebuilds the standalone binaries and rolls the `latest`
# release forward. Pushing a `v*` tag additionally cuts an immutable
# versioned release with the same artifacts.

on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Compile standalone binaries
        run: |
          bun build --compile --minify --target=bun-linux-x64      ./xmac.ts --outfile dist/xmac-linux-x64
          bun build --compile --minify --target=bun-linux-x64-musl ./xmac.ts --outfile dist/xmac-linux-x64-musl

      - name: Smoke-test the glibc binary
        run: |
          ./dist/xmac-linux-x64 --version
          ./dist/xmac-linux-x64 --help > /dev/null

      # Bun's musl builds link libstdc++/libgcc dynamically, so the binary has
      # the same runtime requirement as Bun itself on Alpine: apk add libstdc++.
      - name: Smoke-test the musl binary (Alpine container)
        run: |
          docker run --rm -v "$PWD/dist:/dist" alpine:latest \
            sh -ec 'apk add --no-cache --quiet libstdc++ libgcc && /dist/xmac-linux-x64-musl --version'

      - name: Checksums
        working-directory: dist
        run: sha256sum xmac-* > SHA256SUMS

      - name: Roll the `latest` release (every push to main)
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete latest --yes --cleanup-tag || true
          gh release create latest \
            --title "latest (${GITHUB_SHA::7})" \
            --notes "Rolling build of \`main\` at ${GITHUB_SHA}. For a stable download, use a versioned release." \
            --prerelease \
            dist/xmac-linux-x64 dist/xmac-linux-x64-musl dist/SHA256SUMS

      - name: Versioned release (tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            dist/xmac-linux-x64 dist/xmac-linux-x64-musl dist/SHA256SUMS
