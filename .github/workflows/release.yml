name: release

# Every push to main publishes the standalone binaries as a release tagged
# with the commit SHA, versioned `0.0.0-build-<run number>`, and marked as the
# repository's Latest release so `releases/latest/download/...` always serves
# the newest build. Pushing a `v*` tag cuts a normal versioned release.

on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Compile standalone binaries
        run: |
          bun build --compile --minify --target=bun-linux-x64      ./xmac.ts --outfile dist/xmac-linux-x64
          bun build --compile --minify --target=bun-linux-x64-musl ./xmac.ts --outfile dist/xmac-linux-x64-musl

      - name: Smoke-test the glibc binary
        run: |
          ./dist/xmac-linux-x64 --version
          ./dist/xmac-linux-x64 --help > /dev/null

      # Bun's musl builds link libstdc++/libgcc dynamically, so the binary has
      # the same runtime requirement as Bun itself on Alpine: apk add libstdc++.
      - name: Smoke-test the musl binary (Alpine container)
        run: |
          docker run --rm -v "$PWD/dist:/dist" alpine:latest \
            sh -ec 'apk add --no-cache --quiet libstdc++ libgcc && /dist/xmac-linux-x64-musl --version'

      - name: Checksums
        working-directory: dist
        run: sha256sum xmac-* > SHA256SUMS

      - name: Publish build release (every push to main)
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="0.0.0-build-${GITHUB_RUN_NUMBER}"
          tag="${GITHUB_SHA::12}"
          gh release create "$tag" \
            --target "$GITHUB_SHA" \
            --title "$version" \
            --latest \
            --notes "Automated build \`$version\` of commit ${GITHUB_SHA}." \
            dist/xmac-linux-x64 dist/xmac-linux-x64-musl dist/SHA256SUMS

      - name: Versioned release (tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            dist/xmac-linux-x64 dist/xmac-linux-x64-musl dist/SHA256SUMS
