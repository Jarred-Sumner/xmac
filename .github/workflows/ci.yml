name: ci

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly canary against Apple's live catalog: catches format/catalog drift.
    - cron: "17 6 * * 1"

jobs:
  cross-compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Everything xmac and the smoke tests need:
      #   xz-utils bzip2 .... extraction (pbzx chunks / xar entries)
      #   clang lld ......... cross-compiler + ld64.lld Mach-O linker
      #   llvm .............. llvm-ar/ranlib/lipo/nm/strip for archives & fat binaries
      #   cmake ninja ....... toolchain-file integration test
      #
      # Ubuntu 24.04 ships clang 18, but the macOS 26 SDK's libc++ headers use
      # __builtin_ctzg/__builtin_clzg, which need clang >= 19. Install a recent
      # LLVM from apt.llvm.org instead of the distro default.
      - name: Install toolchain
        env:
          LLVM_VERSION: "21"
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build xz-utils bzip2
          wget -qO /tmp/llvm.sh https://apt.llvm.org/llvm.sh
          sudo bash /tmp/llvm.sh "$LLVM_VERSION"
          sudo apt-get install -y --no-install-recommends "llvm-$LLVM_VERSION" "lld-$LLVM_VERSION"
          # apt.llvm.org installs versioned binaries only; create the
          # unversioned names that xmac's wrappers and CMake toolchain expect.
          for tool in clang clang++ ld64.lld llvm-ar llvm-ranlib llvm-lipo llvm-nm llvm-strip llvm-install-name-tool; do
            if ! command -v "$tool" >/dev/null && command -v "$tool-$LLVM_VERSION" >/dev/null; then
              sudo ln -sf "$(command -v "$tool-$LLVM_VERSION")" "/usr/local/bin/$tool"
              echo "symlinked $tool -> $tool-$LLVM_VERSION"
            fi
          done

      - name: Preflight — verify every required tool is present
        run: |
          set -e
          for tool in bun xz bzip2 gzip clang clang++ ld64.lld llvm-ar llvm-ranlib llvm-lipo cmake ninja; do
            if ! command -v "$tool" >/dev/null; then
              echo "::error::required tool '$tool' is not on PATH"
              exit 1
            fi
            printf '%-14s %s\n' "$tool" "$(command -v "$tool")"
          done
          clang --version | head -1
          ld64.lld --version || true
          bun --version

      - name: Typecheck, lint, format check
        run: |
          bun install --frozen-lockfile
          bun run check

      - name: List available SDKs
        run: bun xmac.ts list

      - name: Splat the latest SDK
        run: bun xmac.ts splat --accept-license --output ./xmac-sdk

      - name: Smoke tests (compile permutation matrix)
        run: bun test ./test

      - name: Standalone binary builds
        run: bun build --compile --minify ./xmac.ts --outfile dist/xmac && ./dist/xmac --version
